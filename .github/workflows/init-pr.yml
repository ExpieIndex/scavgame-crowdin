name: Init PR

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  init-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Create Initial Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CROWDIN_PROJECT_ID: ${{ secrets.CROWDIN_PROJECT_ID }}
          CROWDIN_PERSONAL_TOKEN: ${{ secrets.CROWDIN_PERSONAL_TOKEN }}
        run: |
          set -e
          git config user.name "ExpieIndex"
          git config user.email "expieindex@users.noreply.github.com"

          git remote add upstream https://github.com/Orsoniks/scavgame-locale.git
          git fetch upstream main

          if git diff --quiet upstream/main main -- ID.json README.md; then
            echo "No changes. Exiting."
            exit 0
          fi

          BRANCH_NAME="id-init-$(date +%s)"
          git checkout -b "$BRANCH_NAME" upstream/main

          git checkout main -- ID.json README.md
          git add ID.json README.md

          if git diff --cached --quiet; then
            echo "No changes to commit. Exiting."
            exit 0
          fi

          git commit -m "Init Indonesian locale (ID.json)"
          git push -u origin "$BRANCH_NAME"

          CROWDIN_STATUS="Unknown"
          if [ -n "${CROWDIN_PROJECT_ID:-}" ] && [ -n "${CROWDIN_PERSONAL_TOKEN:-}" ]; then
            CROWDIN_RESPONSE=$(curl -fsSL \
              -H "Authorization: Bearer $CROWDIN_PERSONAL_TOKEN" \
              -H "Content-Type: application/json" \
              "https://api.crowdin.com/api/v2/projects/$CROWDIN_PROJECT_ID/languages/progress?limit=500" \
              || true)

            if [ -n "$CROWDIN_RESPONSE" ]; then
              TRANSLATED=$(echo "$CROWDIN_RESPONSE" | jq -r '.data[] | select(.data.languageId == "id") | .data.translationProgress' | head -n 1)
              APPROVED=$(echo "$CROWDIN_RESPONSE" | jq -r '.data[] | select(.data.languageId == "id") | .data.approvalProgress' | head -n 1)

              if [ -n "${TRANSLATED:-}" ] && [ -n "${APPROVED:-}" ] && [ "$TRANSLATED" != "null" ] && [ "$APPROVED" != "null" ]; then
                CROWDIN_STATUS="$TRANSLATED% Translated, $APPROVED% QA'd by atleast 1 other contributor."
              fi
            fi
          fi

          cat > pr_body.md <<EOF
          ## Type of Contribution

          - [X] New locale
          - [ ] Update to existing locale
          - [ ] Fix (typos, grammar, consistency)
          - [ ] Other (please describe):

          ## Target Locale

          Language: (e.g. pt-BR): \`ID\`

          ## Description

          Please describe what this pull request includes:

          - $CROWDIN_STATUS
          - Complete translation for `main (97%)`, `buildings (95%)`, `moodles (54%)`, `other (95%)`

          ## Locale Checklist

          ### General Requirements

          - [x] I’ve read and followed the contribution guide's recommendations.
          - [x] No keys are missing or extra compared to \`en.json\`.
          - [x] Untranslated lines remain in **English**.
          - [x] I updated the \`README.md\`

          ### Review & Quality

          - [x] The translation has been reviewed by at least one other native speaker.
          EOF

          gh pr create \
            --repo Orsoniks/scavgame-locale \
            --base main \
            --head ExpieIndex:$BRANCH_NAME \
            --title "Initial pull request for the Bahasa Indonesia localization" \
            --body-file pr_body.md
