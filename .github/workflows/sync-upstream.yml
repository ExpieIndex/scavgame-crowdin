name: Sync

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Sync EN.json from upstream
        run: |
          git config user.name "ExpieIndex"
          git config user.email "expieindex@users.noreply.github.com"
          git remote add upstream https://github.com/Orsoniks/scavgame-locale.git
          git fetch upstream main
          git checkout upstream/main -- EN.json

          if git diff --quiet HEAD -- EN.json; then
            echo "No EN.json changes. Exiting."
            exit 0
          fi

          git add EN.json
          git commit -m "chore: sync EN.json from upstream"
          git push origin main
