name: Create PR

on:
  workflow_dispatch:
    inputs:
      include_readme:
        description: 'Include README.md'
        required: true
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

jobs:
  create-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Create Pull Request with gh
        env:
          GH_PR_PAT: ${{ secrets.GH_PR_PAT }}
          CROWDIN_PROJECT_ID: ${{ secrets.CROWDIN_PROJECT_ID }}
          CROWDIN_PERSONAL_TOKEN: ${{ secrets.CROWDIN_PERSONAL_TOKEN }}
        run: |
          set -e
          git config user.name "ExpieIndex"
          git config user.email "expieindex@users.noreply.github.com"
          
          git remote add upstream https://github.com/Orsoniks/scavgame-locale.git
          git fetch upstream main
          
          if [ "${{ inputs.include_readme }}" = "true" ]; then
            if git diff --quiet upstream/main:id-ID.json main:ID.json && git diff --quiet upstream/main main -- README.md; then
              echo "No changes. Exiting."
              exit 0
            fi
          else
            if git diff --quiet upstream/main:id-ID.json main:ID.json; then
              echo "No changes. Exiting."
              exit 0
            fi
          fi

          BRANCH_NAME="id-sync-$(date +%s)"
          git checkout -b $BRANCH_NAME upstream/main
          
          git show main:ID.json > id-ID.json
          git add id-ID.json

          if [ "${{ inputs.include_readme }}" = "true" ]; then
            git checkout main -- README.md
            git add README.md
          fi
          
          if git diff --cached --quiet; then
            echo "No changes. Exiting."
            exit 0
          fi

          git commit -m "Update Indonesian locale"
          git push -u origin $BRANCH_NAME

          if [ "${{ inputs.include_readme }}" = "true" ]; then
            MODIFIED_FILES=$(git diff --name-status upstream/main $BRANCH_NAME -- id-ID.json README.md || true)
          else
            MODIFIED_FILES=$(git diff --name-status upstream/main $BRANCH_NAME -- id-ID.json || true)
          fi
          STATS=$(git diff --shortstat upstream/main $BRANCH_NAME)

          CROWDIN_STATUS="Unknown"
          if [ -n "${CROWDIN_PROJECT_ID:-}" ] && [ -n "${CROWDIN_PERSONAL_TOKEN:-}" ]; then
            CROWDIN_RESPONSE=$(curl -fsSL \
              -H "Authorization: Bearer $CROWDIN_PERSONAL_TOKEN" \
              -H "Content-Type: application/json" \
              "https://api.crowdin.com/api/v2/projects/$CROWDIN_PROJECT_ID/languages/progress?limit=500" \
              || true)

            if [ -n "$CROWDIN_RESPONSE" ]; then
              TRANSLATED=$(echo "$CROWDIN_RESPONSE" | jq -r '.data[] | select(.data.languageId == "id") | .data.translationProgress' | head -n 1)
              APPROVED=$(echo "$CROWDIN_RESPONSE" | jq -r '.data[] | select(.data.languageId == "id") | .data.approvalProgress' | head -n 1)

              if [ -n "${TRANSLATED:-}" ] && [ -n "${APPROVED:-}" ] && [ "$TRANSLATED" != "null" ] && [ "$APPROVED" != "null" ]; then
                CROWDIN_STATUS="$TRANSLATED% Translated, $APPROVED% QA'd by atleast 1 other contributor."
              fi
            fi
          fi

          {
            echo "## Type of Contribution"
            echo
            echo "- [ ] New locale"
            echo "- [x] Update to existing locale"
            echo "- [x] Fix (typos, grammar, consistency)"
            echo "- [ ] Other (please describe):"
            echo
            echo "## Target Locale"
            echo
            echo 'Language: (e.g. pt-BR): `id-ID`'
            echo
            echo "## Description"
            echo
            echo "Please describe what this pull request includes:"
            echo
            echo "- $CROWDIN_STATUS"
            echo "- Diff summary:"
            echo
            echo '```'
            echo "$STATS"
            echo
            echo "$MODIFIED_FILES"
            echo '```'
            echo
            echo "## Locale Checklist"
            echo
            echo "### General Requirements"
            echo
            echo "- [x] I've read and followed the contribution guide's recommendations."
            echo '- [x] No keys are missing or extra compared to `en.json`.'
            echo "- [x] Untranslated lines remain in **English**."
            if [ "${{ inputs.include_readme }}" = "true" ]; then
              echo '- [x] I updated the `README.md`'
            else
              echo '- [ ] I updated the `README.md`'
            fi
            echo
            echo "### Review & Quality"
            echo
            echo "- [x] The translation has been reviewed by at least one other native speaker."
          } > pr_body.md

          if [ -z "${GH_PR_PAT:-}" ]; then
            echo "Missing secret GH_PR_PAT."
            exit 1
          fi

          GH_TOKEN="$GH_PR_PAT" gh pr create \
            --repo Orsoniks/scavgame-locale \
            --base main \
            --head ExpieIndex:$BRANCH_NAME \
            --title "Update Indonesian locale (id-ID.json)" \
            --body-file pr_body.md
