name: Create PR

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  create-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Create Pull Request with gh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          
          git remote add upstream https://github.com/Orsoniks/scavgame-locale.git
          git fetch upstream main
          
          if git diff --quiet upstream/main main -- ID.json; then
            echo "No changes. Exiting."
            exit 0
          fi

          BRANCH_NAME="id-sync-$(date +%s)"
          git checkout -b $BRANCH_NAME upstream/main
          
          git checkout main -- ID.json
          git add ID.json
          
          if git diff --cached --quiet; then
            echo "No changes. Exiting."
            exit 0
          fi

          git commit -m "Update Indonesian locale (ID.json)"
          git push -u origin $BRANCH_NAME

          MODIFIED_FILES=$(git diff --name-status upstream/main $BRANCH_NAME -- ID.json || true)
          STATS=$(git diff --shortstat upstream/main $BRANCH_NAME)
          
          PR_BODY="Automated Pull Request generated by scavgame-crowdin.

          **Changes Included:**
          $STATS

          **Modified Files:**
          \`\`\`
          $MODIFIED_FILES
          \`\`\`
          "

          gh pr create \
            --repo Orsoniks/scavgame-locale \
            --base main \
            --head ExpieIndex:$BRANCH_NAME \
            --title "Update Indonesian locale (ID.json)" \
            --body "$PR_BODY"
